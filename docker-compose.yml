services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  piston:
    image: ghcr.io/engineer-man/piston
    restart: unless-stopped
    privileged: true
    volumes:
      - piston-packages:/piston/packages
    tmpfs:
      - /piston/jobs:exec,uid=1000,gid=1000,mode=711

  backend:
    build:
      context: .
      dockerfile: dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - piston
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      PISTON_URL: http://piston:2000/api/v2

volumes:
  redis-data:
  piston-packages:
  caddy-data:
  caddy-config:
